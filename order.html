<!DOCTYPE html>
<html>
<head>
<title>Place Your Order</title>
</head>

<body>

<h1>🛒 Place Your Order</h1>

<form>

<h2>Select Coffee</h2>

<input type="checkbox"> Espresso ₹100 <br>
<input type="checkbox"> Latte ₹150 <br>
<input type="checkbox"> Cappuccino ₹180 <br><br>

<h2>Select Quantity</h2>

Espresso:
<input type="number" min="1" max="10"> <br><br>

Latte:
<input type="number" min="1" max="10"> <br><br>

Cappuccino:
<input type="number" min="1" max="10"> <br><br>

<h2>Payment Mode</h2>

<input type="radio" name="pay"> Cash <br>
<input type="radio" name="pay"> UPI <br>
<input type="radio" name="pay"> Card <br><br>

<h2>Total Amount</h2>

<input type="text" placeholder="Enter Total Amount"><br><br>

<input type="submit" value="Place Order">

</form>

</body>
</html>
